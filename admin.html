<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="theme-color" content="#0a0a0c" />
<title>Panel · Formularios Pipe</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%23ff8a40'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#0a0a0c; --panel:#131318; --panel-2:#1a1a21; --line:rgba(255,255,255,.08);
    --line-2:rgba(255,255,255,.14); --text:#f2f2f4; --text-2:#a0a0aa; --text-3:#6b6b76;
    --amber:#ff8a40; --amber-soft:#ffb070; --amber-deep:#3a1e0e;
    --green:#3ecf8e; --red:#ff5c6c; --radius:14px;
    --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--amber);text-decoration:none}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit;font-size:14px;color:var(--text);background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
  input:focus,textarea:focus,select:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(255,138,64,.12)}
  textarea{resize:vertical;min-height:72px;line-height:1.5}
  label{display:block;font-size:12px;color:var(--text-2);margin-bottom:6px;font-weight:500}
  .mono{font-family:var(--mono)}
  .muted{color:var(--text-2)}
  .dim{color:var(--text-3)}

  /* botones */
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line-2);background:var(--panel-2);color:var(--text);padding:9px 15px;border-radius:9px;font-size:13.5px;font-weight:500;transition:.15s;white-space:nowrap}
  .btn:hover{border-color:var(--amber);color:#fff}
  .btn.primary{background:linear-gradient(180deg,var(--amber),#ff7a2a);border-color:var(--amber);color:#180c04;font-weight:600}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--text-2)}
  .btn.ghost:hover{color:#fff;background:var(--panel-2)}
  .btn.danger:hover{border-color:var(--red);color:var(--red)}
  .btn.sm{padding:6px 11px;font-size:12.5px}
  .btn.icon{padding:7px 9px}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  .badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:6px;border:1px solid var(--line-2);color:var(--text-2)}
  .badge.on{color:var(--green);border-color:rgba(62,207,142,.4);background:rgba(62,207,142,.08)}
  .badge.off{color:var(--text-3)}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}

  /* layout */
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 24px;background:rgba(10,10,12,.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.01em}
  .brand .bd{width:10px;height:10px;border-radius:50%;background:var(--amber);box-shadow:0 0 14px var(--amber)}
  .wrap{max-width:1080px;margin:0 auto;padding:28px 24px 80px}
  .crumbs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2);margin-bottom:18px;flex-wrap:wrap}
  .crumbs a{color:var(--text-2)} .crumbs a:hover{color:var(--amber)}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius)}
  .row{display:flex;align-items:center;gap:14px}
  .between{justify-content:space-between}
  .grid{display:grid;gap:14px}
  h1{font-size:26px;font-weight:700;letter-spacing:-.02em}
  h2{font-size:18px;font-weight:600;letter-spacing:-.01em}
  h3{font-size:14px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono)}

  /* form list */
  .flist{display:grid;gap:12px}
  .fitem{display:flex;align-items:center;gap:16px;padding:18px 20px;cursor:pointer;transition:.15s}
  .fitem:hover{border-color:var(--line-2);background:var(--panel-2)}
  .fitem .ftitle{font-size:16.5px;font-weight:600}
  .fitem .fmeta{font-size:12.5px;color:var(--text-3);font-family:var(--mono);margin-top:3px}
  .fcount{margin-left:auto;text-align:right}
  .fcount .n{font-size:24px;font-weight:700;line-height:1}
  .fcount .l{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em}

  /* tables */
  .table{width:100%;border-collapse:collapse}
  .table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line)}
  .table td{padding:12px;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top}
  .table tr:last-child td{border-bottom:none}
  .table tr.clickable{cursor:pointer}
  .table tr.clickable:hover td{background:var(--panel-2)}
  .pct{font-family:var(--mono);font-size:13px;color:var(--text-2)}

  /* tabs */
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:22px}
  .tab{padding:10px 16px;font-size:14px;color:var(--text-2);border-bottom:2px solid transparent;font-weight:500;background:none;border-top:none;border-left:none;border-right:none}
  .tab.active{color:#fff;border-bottom-color:var(--amber)}

  /* builder */
  .section{padding:20px}
  .section + .section{border-top:1px solid var(--line)}
  .field{margin-bottom:14px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .item-card{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:14px;margin-bottom:12px}
  .item-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .item-head .ix{font-family:var(--mono);font-size:12px;color:var(--amber);font-weight:600}
  .item-actions{margin-left:auto;display:flex;gap:4px}
  .switch{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
  .switch input{display:none}
  .switch .track{width:38px;height:22px;border-radius:11px;background:var(--panel-2);border:1px solid var(--line-2);position:relative;transition:.18s}
  .switch .track::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--text-3);transition:.18s}
  .switch input:checked + .track{background:rgba(255,138,64,.25);border-color:var(--amber)}
  .switch input:checked + .track::after{transform:translateX(16px);background:var(--amber)}

  /* modal / drawer */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:flex;justify-content:flex-end}
  .drawer{width:min(640px,100%);height:100%;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:28px;animation:slidein .25s ease}
  @keyframes slidein{from{transform:translateX(30px);opacity:.4}to{transform:none;opacity:1}}
  .ans-q{margin-bottom:18px}
  .ans-q .ql{font-size:12px;color:var(--text-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
  .ans-q .qt{font-size:14px;font-weight:600;margin-bottom:6px}
  .ans-q .qa{font-size:14px;color:var(--text);background:var(--panel-2);border-left:3px solid var(--amber);padding:10px 13px;border-radius:0 8px 8px 0;white-space:pre-wrap;line-height:1.55}
  .ans-q .qa.empty{color:var(--text-3);font-style:italic;border-left-color:var(--line-2)}

  /* login */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{width:100%;max-width:380px;padding:36px}
  .login-card h1{font-size:22px;margin-bottom:6px}

  /* toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:90;background:var(--panel-2);border:1px solid var(--line-2);border-radius:10px;padding:12px 18px;font-size:14px;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{border-color:var(--red);color:var(--red)}
  .toast.ok{border-color:var(--green)}

  .empty{text-align:center;padding:54px 20px;color:var(--text-3)}
  .spinner{width:18px;height:18px;border:2px solid var(--line-2);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hide{display:none!important}
  @media(max-width:640px){.two,.three{grid-template-columns:1fr}.wrap{padding:20px 16px 70px}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login-wrap hide">
  <div class="card login-card">
    <div class="brand" style="margin-bottom:20px"><span class="bd"></span> Panel de Formularios</div>
    <h1>Entrar</h1>
    <p class="muted" style="font-size:13.5px;margin-bottom:22px">Acceso solo para Pipe.</p>
    <form id="login-form" class="grid" style="gap:14px">
      <div><label>Correo</label><input id="login-email" type="email" autocomplete="username" required></div>
      <div><label>Contraseña</label><input id="login-pass" type="password" autocomplete="current-password" required></div>
      <button class="btn primary" type="submit" style="justify-content:center;padding:12px" id="login-btn">Entrar</button>
      <div id="login-err" class="hide" style="color:var(--red);font-size:13px"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="app" class="hide">
  <div class="topbar">
    <div class="brand"><span class="bd"></span> Formularios <span class="dim" style="font-weight:400">· Pipe</span></div>
    <div class="row" style="gap:10px">
      <span id="who" class="muted" style="font-size:13px"></span>
      <button class="btn ghost sm" id="logout">Salir</button>
    </div>
  </div>
  <div class="wrap" id="view"><div class="empty"><span class="spinner"></span></div></div>
</div>

<div id="toast" class="toast"></div>

<script>
/* ============================================================
   SUPABASE
   ============================================================ */
const SB_URL = 'https://gnazsksbtxfyxivdpgvg.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImduYXpza3NidHhmeXhpdmRwZ3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDMwMjYsImV4cCI6MjA5NTM3OTAyNn0.YCfw1pJefa_b2ehDS1RyKJ6J4Jf9ZVv50Ih5Crwn1XU';
const sb = supabase.createClient(SB_URL, SB_ANON);
const PUBLIC_BASE = location.origin + location.pathname.replace(/admin\.html$/, 'index.html');

const $ = s => document.querySelector(s);
const el = (tag, attrs={}, html='') => { const e=document.createElement(tag); Object.entries(attrs).forEach(([k,v])=>{ if(k==='class')e.className=v; else if(k==='html')e.innerHTML=v; else e.setAttribute(k,v); }); if(html)e.innerHTML=html; return e; };
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const slugify = s => String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,60);
function toast(msg, kind=''){ const t=$('#toast'); t.textContent=msg; t.className='toast show '+kind; clearTimeout(window._tt); window._tt=setTimeout(()=>t.className='toast',2600); }

/* ============================================================
   AUTH
   ============================================================ */
async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session) showApp(session); else showLogin();
  sb.auth.onAuthStateChange((_e, s)=>{ if(s) showApp(s); else showLogin(); });
}
function showLogin(){ $('#app').classList.add('hide'); $('#login').classList.remove('hide'); }
function showApp(session){
  $('#login').classList.add('hide'); $('#app').classList.remove('hide');
  $('#who').textContent = session.user.email;
  route();
}
$('#login-form').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn=$('#login-btn'), err=$('#login-err');
  err.classList.add('hide'); btn.disabled=true; btn.textContent='Entrando…';
  const { error } = await sb.auth.signInWithPassword({ email:$('#login-email').value.trim(), password:$('#login-pass').value });
  btn.disabled=false; btn.textContent='Entrar';
  if(error){ err.textContent = error.message==='Invalid login credentials' ? 'Correo o contraseña incorrectos.' : error.message; err.classList.remove('hide'); }
});
$('#logout').addEventListener('click', async()=>{ await sb.auth.signOut(); location.hash=''; });

/* ============================================================
   ROUTER (hash)
   ============================================================ */
window.addEventListener('hashchange', route);
function route(){
  if($('#app').classList.contains('hide')) return;
  const h = location.hash.slice(1);
  const [page, id] = h.split('/');
  if(page==='form' && id) return viewForm(id);
  if(page==='builder') return viewBuilder(id||null);
  return viewForms();
}
const setView = node => { const v=$('#view'); v.innerHTML=''; v.appendChild(node); };
const loading = () => setView(el('div',{class:'empty'},'<span class="spinner"></span>'));

/* ============================================================
   VISTA: lista de formularios
   ============================================================ */
async function viewForms(){
  loading();
  const { data:forms, error } = await sb.from('forms').select('id,slug,title,subtitle,is_published,created_at').order('created_at',{ascending:false});
  if(error){ toast('Error cargando formularios: '+error.message,'err'); return; }
  // conteos por formulario
  const counts = {};
  await Promise.all(forms.map(async f=>{
    const { count } = await sb.from('responses').select('id',{count:'exact',head:true}).eq('form_id',f.id);
    counts[f.id]=count||0;
  }));

  const root = el('div');
  const head = el('div',{class:'row between',style:'margin-bottom:22px'});
  head.appendChild(el('div',{},'<h1>Tus formularios</h1><p class="muted" style="font-size:14px;margin-top:4px">'+forms.length+' formulario'+(forms.length===1?'':'s')+'</p>'));
  const newBtn = el('button',{class:'btn primary'},'+ Crear formulario');
  newBtn.onclick=()=>location.hash='builder/new';
  head.appendChild(newBtn);
  root.appendChild(head);

  if(!forms.length){ root.appendChild(el('div',{class:'card empty'},'Todavía no hay formularios. Creá el primero.')); setView(root); return; }

  const list = el('div',{class:'flist'});
  forms.forEach(f=>{
    const item = el('div',{class:'card fitem'});
    item.innerHTML = `
      <div style="min-width:0">
        <div class="ftitle">${esc(f.title)} ${f.is_published?'<span class="badge on"><span class="dot"></span>Publicado</span>':'<span class="badge off">Borrador</span>'}</div>
        <div class="fmeta">${esc(f.slug)} · creado ${new Date(f.created_at).toLocaleDateString('es-CO')}</div>
      </div>
      <div class="fcount"><div class="n">${counts[f.id]}</div><div class="l">respuestas</div></div>`;
    item.onclick=()=>location.hash='form/'+f.id;
    list.appendChild(item);
  });
  root.appendChild(list);
  setView(root);
}

/* ============================================================
   VISTA: detalle de un formulario (respuestas + ajustes)
   ============================================================ */
async function viewForm(id){
  loading();
  const { data:form, error } = await sb.from('forms').select('*').eq('id',id).single();
  if(error||!form){ toast('No se encontró el formulario','err'); location.hash=''; return; }
  const { data:responses } = await sb.from('responses').select('*').eq('form_id',id).order('submitted_at',{ascending:false});
  const schema = form.schema||{};
  const questions = schema.questions||[];

  const root = el('div');
  root.appendChild(el('div',{class:'crumbs'},`<a href="#">Formularios</a> <span>/</span> <span>${esc(form.title)}</span>`));

  const head = el('div',{class:'row between',style:'margin-bottom:8px;flex-wrap:wrap;gap:12px'});
  head.appendChild(el('div',{},`<h1>${esc(form.title)}</h1>`));
  const actions = el('div',{class:'row',style:'gap:8px'});
  const linkBtn = el('button',{class:'btn sm'},'🔗 Copiar link');
  const publicUrl = PUBLIC_BASE+'?f='+encodeURIComponent(form.slug);
  linkBtn.onclick=()=>{ navigator.clipboard.writeText(publicUrl); toast('Link copiado','ok'); };
  const openBtn = el('a',{class:'btn sm',href:publicUrl,target:'_blank'},'Ver público ↗');
  const editBtn = el('button',{class:'btn sm'},'✎ Editar');
  editBtn.onclick=()=>location.hash='builder/'+id;
  actions.append(linkBtn, openBtn, editBtn);
  head.appendChild(actions);
  root.appendChild(head);
  root.appendChild(el('div',{class:'muted',style:'font-size:13px;margin-bottom:24px'},
    `${form.is_published?'<span class="badge on"><span class="dot"></span>Publicado</span>':'<span class="badge off">Borrador — el link público no funciona hasta publicar</span>'} &nbsp; <span class="mono dim">${esc(publicUrl)}</span>`));

  // barra de export
  const bar = el('div',{class:'row between',style:'margin-bottom:14px;flex-wrap:wrap;gap:10px'});
  bar.appendChild(el('h2',{},`${responses?responses.length:0} respuesta${(responses&&responses.length===1)?'':'s'}`));
  const exp = el('div',{class:'row',style:'gap:8px'});
  const csvBtn = el('button',{class:'btn sm'},'⬇ Exportar CSV');
  const jsonBtn = el('button',{class:'btn sm'},'⬇ JSON');
  csvBtn.onclick=()=>exportCSV(form, responses||[]);
  jsonBtn.onclick=()=>exportJSON(form, responses||[]);
  if(!responses||!responses.length){ csvBtn.disabled=true; jsonBtn.disabled=true; }
  exp.append(csvBtn, jsonBtn);
  bar.appendChild(exp);
  root.appendChild(bar);

  if(!responses||!responses.length){
    root.appendChild(el('div',{class:'card empty'},'Nadie ha respondido todavía. Compartí el link público.'));
    setView(root); return;
  }

  const tableCard = el('div',{class:'card',style:'overflow-x:auto'});
  const table = el('table',{class:'table'});
  table.innerHTML = `<thead><tr><th>Quién</th><th>Contacto</th><th>Completado</th><th>Fecha</th></tr></thead>`;
  const tbody = el('tbody');
  responses.forEach(r=>{
    const answered = questions.filter(q=>((r.answers||{})[q.id]||'').toString().trim()).length;
    const pct = questions.length ? Math.round(answered/questions.length*100) : 0;
    const tr = el('tr',{class:'clickable'});
    tr.innerHTML = `
      <td><strong>${esc(r.respondent_name||'—')}</strong></td>
      <td class="muted" style="font-size:13px">${esc(r.respondent_email||'')}${r.respondent_email&&r.respondent_whatsapp?'<br>':''}${esc(r.respondent_whatsapp||'')}</td>
      <td class="pct">${answered}/${questions.length} · ${pct}%</td>
      <td class="muted" style="font-size:13px;white-space:nowrap">${new Date(r.submitted_at).toLocaleString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</td>`;
    tr.onclick=()=>openResponse(form, r);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  tableCard.appendChild(table);
  root.appendChild(tableCard);
  setView(root);
}

/* ver una respuesta completa en drawer */
function openResponse(form, r){
  const schema=form.schema||{}, blocks=schema.blocks||[], questions=schema.questions||[], audios=schema.audios||[];
  const ov = el('div',{class:'overlay'});
  ov.onclick=e=>{ if(e.target===ov) ov.remove(); };
  const d = el('div',{class:'drawer'});
  let h = `<div class="row between" style="margin-bottom:20px">
    <div><h2>${esc(r.respondent_name||'Respuesta')}</h2>
    <div class="muted" style="font-size:13px;margin-top:4px">${esc([r.respondent_email,r.respondent_whatsapp].filter(Boolean).join(' · '))}</div>
    <div class="dim" style="font-size:12px;margin-top:2px">${new Date(r.submitted_at).toLocaleString('es-CO')}</div></div>
    <button class="btn ghost icon" id="closedrawer">✕</button></div>`;
  const ans=r.answers||{};
  (blocks.length?blocks:[{n:null,tag:''}]).forEach(b=>{
    if(b.n!=null) h+=`<h3 style="margin:22px 0 12px">Bloque ${b.n} · ${esc(b.tag||'')}</h3>`;
    questions.filter(q=>b.n==null||q.b===b.n).forEach(q=>{
      const a=(ans[q.id]||'').toString().trim();
      h+=`<div class="ans-q"><div class="ql">${esc(q.label||('P'+q.id))}</div><div class="qt">${esc(q.text)}</div><div class="qa ${a?'':'empty'}">${a?esc(a):'(sin respuesta)'}</div></div>`;
    });
  });
  if(audios.length){
    h+='<h3 style="margin:22px 0 12px">Audios</h3>';
    audios.forEach(au=>{ const done=(r.audios||{})[au.letter]; h+=`<div class="ans-q"><div class="ql">Audio ${esc(au.letter)} ${done?'· marcado como grabado':'· pendiente'}</div><div class="qt">${esc(au.title)}</div></div>`; });
  }
  d.innerHTML=h;
  ov.appendChild(d);
  document.body.appendChild(ov);
  d.querySelector('#closedrawer').onclick=()=>ov.remove();
}

/* ============================================================
   EXPORT
   ============================================================ */
function downloadFile(name, content, type){
  const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob);
  const a=el('a',{href:url,download:name}); document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function csvCell(v){ v=(v==null?'':String(v)); return '"'+v.replace(/"/g,'""')+'"'; }
function exportCSV(form, responses){
  const questions=(form.schema||{}).questions||[];
  const header=['Nombre','Email','WhatsApp','Fecha', ...questions.map(q=>q.label||q.text||('P'+q.id))];
  const rows=[header.map(csvCell).join(',')];
  responses.forEach(r=>{
    const base=[r.respondent_name, r.respondent_email, r.respondent_whatsapp, new Date(r.submitted_at).toLocaleString('es-CO')];
    const qa=questions.map(q=>(r.answers||{})[q.id]||'');
    rows.push([...base,...qa].map(csvCell).join(','));
  });
  downloadFile(slugify(form.title)+'-respuestas.csv', '﻿'+rows.join('\r\n'), 'text/csv;charset=utf-8');
  toast('CSV descargado','ok');
}
function exportJSON(form, responses){
  downloadFile(slugify(form.title)+'-respuestas.json', JSON.stringify({form:{slug:form.slug,title:form.title}, responses}, null, 2), 'application/json');
  toast('JSON descargado','ok');
}

let B = null; // estado de edición { id, slug, title, subtitle, is_published, schema }

async function viewBuilder(id){
  loading();
  if(id && id !== 'new'){
    const { data:form, error } = await sb.from('forms').select('*').eq('id',id).single();
    if(error||!form){ toast('No se encontró el formulario','err'); location.hash=''; return; }
    B = { id:form.id, slug:form.slug, title:form.title, subtitle:form.subtitle||'', is_published:form.is_published, schema: Object.assign(blankSchema(), form.schema||{}) };
    // asegura subobjetos
    const bs=blankSchema(); ['branding','intro','identity','final'].forEach(k=>B.schema[k]=Object.assign({}, bs[k], B.schema[k]||{}));
    B.schema.intro.step=Object.assign({}, bs.intro.step, B.schema.intro.step||{});
    B.schema.final.step=Object.assign({}, bs.final.step, B.schema.final.step||{});
    B.schema.blocks=B.schema.blocks||[]; B.schema.questions=B.schema.questions||[]; B.schema.audios=B.schema.audios||[];
  } else {
    B = { id:null, slug:'', title:'', subtitle:'', is_published:false, schema:blankSchema() };
  }
  renderBuilder();
}

let builderTab='contenido';
function renderBuilder(){
  const root=el('div');
  root.appendChild(el('div',{class:'crumbs'},`<a href="#">Formularios</a> <span>/</span> <span>${B.id?'Editar':'Nuevo'}</span>`));

  const head=el('div',{class:'row between',style:'margin-bottom:20px;flex-wrap:wrap;gap:12px'});
  head.appendChild(el('h1',{},B.id?'Editar formulario':'Crear formulario'));
  const ha=el('div',{class:'row',style:'gap:8px'});
  const pubSwitch=el('label',{class:'switch',title:'Publicar (activa el link público)'});
  pubSwitch.innerHTML=`<input type="checkbox" ${B.is_published?'checked':''}><span class="track"></span><span style="font-size:13px;color:var(--text-2)">Publicado</span>`;
  pubSwitch.querySelector('input').onchange=e=>B.is_published=e.target.checked;
  const saveBtn=el('button',{class:'btn primary',id:'savebtn'},'Guardar');
  saveBtn.onclick=saveForm;
  ha.append(pubSwitch, saveBtn);
  head.appendChild(ha);
  root.appendChild(head);

  // tabs
  const tabs=el('div',{class:'tabs'});
  [['contenido','Contenido'],['intro','Intro y cierre'],['identidad','Identidad'],['marca','Marca']].forEach(([k,lbl])=>{
    const t=el('button',{class:'tab'+(builderTab===k?' active':'')},lbl);
    t.onclick=()=>{ builderTab=k; renderBuilder(); };
    tabs.appendChild(t);
  });
  root.appendChild(tabs);

  const body=el('div',{class:'card'});
  if(builderTab==='contenido') buildTabContenido(body);
  else if(builderTab==='intro') buildTabIntro(body);
  else if(builderTab==='identidad') buildTabIdentidad(body);
  else if(builderTab==='marca') buildTabMarca(body);
  root.appendChild(body);
  setView(root);
}

// helper: input enlazado a un objeto
function bound(obj, key, label, opts={}){
  const wrap=el('div',{class:'field'});
  if(label) wrap.appendChild(el('label',{},label));
  const tag = opts.textarea?'textarea':'input';
  const node=el(tag,{}); if(opts.type)node.type=opts.type; if(opts.placeholder)node.placeholder=opts.placeholder;
  node.value=obj[key]==null?'':obj[key];
  node.oninput=e=>{ obj[key]= (opts.type==='number')? (e.target.value===''?'':Number(e.target.value)) : e.target.value; if(opts.on)opts.on(e.target.value); };
  wrap.appendChild(node);
  if(opts.help) wrap.appendChild(el('div',{class:'dim',style:'font-size:11.5px;margin-top:4px'},opts.help));
  return wrap;
}

function moveBtn(arr,i,dir,re){ const b=el('button',{class:'btn ghost sm icon',title:dir<0?'Subir':'Bajar'}, dir<0?'↑':'↓'); b.onclick=()=>{ const j=i+dir; if(j<0||j>=arr.length)return; [arr[i],arr[j]]=[arr[j],arr[i]]; re(); }; return b; }
function delBtn(fn){ const b=el('button',{class:'btn ghost sm icon danger',title:'Borrar'},'✕'); b.onclick=fn; return b; }

/* ---- Guardar ---- */
async function saveForm(){
  if(!B.title.trim()){ toast('Ponele un título','err'); builderTab='contenido'; renderBuilder(); return; }
  if(!B.slug){ B.slug=slugify(B.title); }
  if(!B.schema.questions.length){ toast('Agregá al menos una pregunta','err'); return; }
  // normaliza: cada bloque necesita .mood, cada pregunta su id
  B.schema.blocks.forEach(b=>{ if(!b.mood)b.mood=[1.0,0.6]; });
  const btn=$('#savebtn'); if(btn){ btn.disabled=true; btn.textContent='Guardando…'; }
  const payload={ slug:B.slug, title:B.title.trim(), subtitle:B.subtitle||null, schema:B.schema, is_published:B.is_published };
  let res;
  if(B.id) res=await sb.from('forms').update(payload).eq('id',B.id).select('id').single();
  else res=await sb.from('forms').insert(payload).select('id').single();
  if(btn){ btn.disabled=false; btn.textContent='Guardar'; }
  if(res.error){
    if(res.error.code==='23505'||/duplicate|unique/i.test(res.error.message)) toast('Ya existe un formulario con ese código de link. Cambiá el slug.','err');
    else toast('Error al guardar: '+res.error.message,'err');
    return;
  }
  toast('Guardado ✓','ok');
  location.hash='form/'+res.data.id;
}
